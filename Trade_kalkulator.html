<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <title>Risk Manager</title>
  
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    
    input,
    select {
      padding: 6px;
      border-radius: 4px;
      border: none;
      margin: 3px;
    }
    
    button {
      padding: 6px 12px;
      background: #22c55e;
      border: none;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }
    
    table {
      width: 100%;
      margin-top: 15px;
      border-collapse: collapse;
    }
    
    th,
    td {
      padding: 8px;
      border-bottom: 1px solid #334155;
      text-align: center;
    }
    
    .result {
      margin-top: 20px;
      background: #1e293b;
      padding: 15px;
      border-radius: 8px;
    }
    
    .warning {
      color: #ef4444;
      font-weight: bold;
    }
  </style>
</head>


<body>
  
  <h2>Trading Risk Calculator</h2>
  
  DD Daily :
  <input id="ddDaily" type="number" value="150">
  
  DD Max :
  <input id="ddMax" type="number" value="190">
  
  <br><br>
  
  <button onclick="addRow()">Tambah Pair</button>
  
  <table id="table">
    
    <thead>
      <tr>
        <th>Pair</th>
        <th>Risk ($)</th>
        <th>Hapus</th>
      </tr>
    </thead>
    
    <tbody></tbody>
    
  </table>
  
  
  <div class="result">
    
    Total Risk : <span id="totalRisk">0</span>
    
    <br><br>
    
    Sisa DD Daily : <span id="remainDaily">0</span>
    
    <br><br>
    
    Sisa DD Max : <span id="remainMax">0</span>
    
    <br><br>
    
    <span id="warning"></span>
    
  </div>
  
  
  <script>
    const pairs = [
      "USDJPY", "EURJPY", "GBPJPY", "AUDJPY",
      "NZDJPY", "CHFJPY", "CADJPY"
    ]
    
    
    function addRow() {
      
      const tbody = document.querySelector("#table tbody")
      
      const tr = document.createElement("tr")
      
      tr.innerHTML = `

<td>
<select class="pair">
${pairs.map(p=>`<option>${p}</option>`).join("")}
</select>
</td>

<td>
<input class="risk" type="number" step="0.01">
</td>

<td>
<button onclick="removeRow(this)">X</button>
</td>

`
      
      tbody.appendChild(tr)
      
      attachEvents()
      
    }
    
    
    
    function removeRow(btn) {
      
      btn.parentElement.parentElement.remove()
      
      calculate()
      
    }
    
    
    
    function attachEvents() {
      
      document.querySelectorAll(".risk").forEach(i => {
        
        i.oninput = calculate
        
      })
      
    }
    
    
    
    function calculate() {
      
      let total = 0
      
      document.querySelectorAll(".risk").forEach(i => {
        
        total += parseFloat(i.value) || 0
        
      })
      
      const ddDaily = parseFloat(ddDailyInput.value) || 0
      const ddMax = parseFloat(ddMaxInput.value) || 0
      
      document.getElementById("totalRisk").innerText = total.toFixed(2)
      
      document.getElementById("remainDaily").innerText = (ddDaily - total).toFixed(2)
      
      document.getElementById("remainMax").innerText = (ddMax - total).toFixed(2)
      
      let warn = ""
      
      if (total > ddDaily) warn = "⚠ Melebihi DD Daily!"
      
      if (total > ddMax) warn = "⛔ Melebihi DD Max!"
      
      document.getElementById("warning").innerText = warn
      
    }
    
    const ddDailyInput = document.getElementById("ddDaily")
    const ddMaxInput = document.getElementById("ddMax")
    
    ddDailyInput.oninput = calculate
    ddMaxInput.oninput = calculate
    
    addRow()
    addRow()
  </script>
  
</body>

</html>
